name: Cyberdriver Windows MSI Release

on:
  workflow_call:
    inputs:
      release_tag:
        type: string
        required: false
        default: "test"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to create/update"
        required: false
        default: "test"

permissions:
  contents: write

env:
  RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_DEFAULT_HOST_TRIPLET: "x64-windows-static"
  RELEASE_TAG: ${{ inputs.release_tag || 'test' }}

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-windows-msi:
    name: Build Windows MSI
    needs: generate-bridge
    runs-on: windows-2022

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: bridge-artifact
          path: ./

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@1a3da29f56261a1e1f937ec88f0856a9b8321d7e
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@2783a3f08e1baf891508463f8c6653c258246225
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Replace engine with RustDesk custom Flutter engine
        shell: pwsh
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          $expectedHash = "ec8cabf36ee4ff24c8d98de25b00e70781eb03876265aee84d0fe554a110036e"
          $actualHash = (Get-FileHash windows-x64-release.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash) {
            throw "RustDesk Flutter engine checksum mismatch: expected $expectedHash, got $actualHash"
          }
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          $engineDir = "C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release"
          Copy-Item -Recurse -Force windows-x64-release/* $engineDir

      - name: Patch Flutter
        shell: bash
        run: |
          if [[ "${{ env.FLUTTER_VERSION }}" == "3.24.5" ]]; then
            cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff "$(dirname "$(dirname "$(which flutter)")")"
            cd "$(dirname "$(dirname "$(which flutter)")")"
            git apply flutter_3.24.4_dropdown_menu_enableFilter.diff
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          prefix-key: windows-msi

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          if ! "$VCPKG_ROOT/vcpkg" install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"; then
            find "$VCPKG_ROOT/" -name "*.log" | while read -r log_file; do
              echo "$log_file:"
              echo "======"
              cat "$log_file"
              echo "======"
              echo ""
            done
            exit 1
          fi

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Read Cyberdriver version
        id: version
        shell: pwsh
        run: |
          $cargo = Get-Content Cargo.toml -Raw
          if ($cargo -notmatch '(?ms)^\[package\]\s*$.*?^version\s*=\s*"([^"]+)"') {
            throw "Could not read version from Cargo.toml"
          }
          "version=$($Matches[1])" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build Cyberdriver Flutter bundle
        shell: pwsh
        run: |
          python .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack

      - name: Prepare MSI input directory
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force msi-dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force msi-dist | Out-Null
          Copy-Item -Recurse flutter\build\windows\x64\runner\Release\* msi-dist\
          if (Test-Path msi-dist\rustdesk.exe) {
            Rename-Item msi-dist\rustdesk.exe Cyberdriver.exe
          }
          if (!(Test-Path msi-dist\Cyberdriver.exe)) {
            throw "Cyberdriver.exe was not found in Flutter release bundle"
          }
          Get-ChildItem -Recurse msi-dist

      - name: Build MSI
        shell: pwsh
        run: |
          Push-Location res\msi
          python preprocess.py --arp -d ../../msi-dist --app-name Cyberdriver -m "Cyberdesk, Inc" -v "${{ steps.version.outputs.version }}"
          nuget restore msi.sln
          msbuild msi.sln -p:Configuration=Release -p:Platform=x64 /p:TargetVersion=Windows10
          Pop-Location
          New-Item -ItemType Directory -Force SignOutput | Out-Null
          $packageMsi = Get-ChildItem -Path res\msi\Package\bin -Recurse -Filter Package.msi | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($null -eq $packageMsi) {
            throw "Package.msi was not found under res\msi\Package\bin"
          }
          Copy-Item $packageMsi.FullName "SignOutput\Cyberdriver-${{ steps.version.outputs.version }}-windows-x64.msi"
          Get-FileHash "SignOutput\Cyberdriver-${{ steps.version.outputs.version }}-windows-x64.msi" -Algorithm SHA256

      - name: Upload MSI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cyberdriver-windows-msi
          path: SignOutput/Cyberdriver-*-windows-x64.msi

      - name: Publish test release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: Cyberdriver ${{ env.RELEASE_TAG }}
          prerelease: ${{ env.RELEASE_TAG == 'test' || env.RELEASE_TAG == 'ci' || env.RELEASE_TAG == 'nightly' }}
          make_latest: ${{ env.RELEASE_TAG != 'test' && env.RELEASE_TAG != 'ci' && env.RELEASE_TAG != 'nightly' }}
          files: SignOutput/Cyberdriver-*-windows-x64.msi
          body: |
            Automated Cyberdriver Windows MSI build from `${{ github.ref_name }}`.

            This artifact is unsigned and may be flagged by Windows Defender or SmartScreen.
